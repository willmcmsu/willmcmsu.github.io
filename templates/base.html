<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>{{ site_title }}</title>

  <!-- Base styles always loaded -->
  <link rel="stylesheet" href="css/base.css" />

  <!-- Theme stylesheet — controlled by `theme` in portfolio_config.yaml -->
  <link rel="stylesheet" href="css/themes/{{ theme }}.css" />
</head>
<body>

  <!-- ===== Header ===== -->
  <header class="site-header">
    <div class="header-inner">
      <div class="header-name">{{ student.name }}</div>
      <div class="header-tagline">{{ student.tagline }}</div>
    </div>

    <!-- Navigation bar -->
    <nav class="site-nav">
      <a href="#about">About</a>
      <a href="#projects">Projects</a>
      <a href="#contact">Contact</a>
    </nav>
    
  </header>

  <!-- ===== Main content (filled in by child templates) ===== -->
  <main class="site-main">
    {% block content %}{% endblock %}
  </main>

  <!-- ===== Footer ===== -->
  <footer class="site-footer">
    <p>Designed by Will McNeilly</p>
  </footer>

</body>
</html>
